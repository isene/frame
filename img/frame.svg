<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="word-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7"/>
      <stop offset="100%" style="stop-color:#bd93f9"/>
    </linearGradient>
    <linearGradient id="frame-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bd93f9"/>
      <stop offset="100%" style="stop-color:#7aa2f7"/>
    </linearGradient>
  </defs>

  <!-- Same circular frame as the rest of the suite -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#word-grad)" stroke-width="3"/>

  <!-- The window frame: outer rectangle with a titlebar slab on top -->
  <rect x="58" y="68" width="140" height="110" rx="4" ry="4"
        fill="none" stroke="url(#frame-grad)" stroke-width="6"/>

  <!-- Titlebar fill -->
  <rect x="61" y="71" width="134" height="18" fill="#7aa2f7" opacity="0.55"/>

  <!-- Three "button" dots in the titlebar -->
  <circle cx="73"  cy="80" r="4" fill="#f7768e"/>
  <circle cx="87"  cy="80" r="4" fill="#e0af68"/>
  <circle cx="101" cy="80" r="4" fill="#9ece6a"/>

  <!-- Inner pane: faint grid suggesting 'pixels' -->
  <g stroke="#bd93f9" stroke-width="0.7" opacity="0.35">
    <line x1="61" y1="110" x2="195" y2="110"/>
    <line x1="61" y1="130" x2="195" y2="130"/>
    <line x1="61" y1="150" x2="195" y2="150"/>
    <line x1="95"  y1="92" x2="95"  y2="175"/>
    <line x1="128" y1="92" x2="128" y2="175"/>
    <line x1="161" y1="92" x2="161" y2="175"/>
  </g>

  <!-- Wordmark -->
  <text x="128" y="222" font-family="monospace" font-size="28" font-weight="bold"
        fill="#7aa2f7" text-anchor="middle" letter-spacing="3">frame</text>
</svg>
